<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AI情感分析系统</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 2rem auto; padding: 0 20px; }
        .info { color: #2c3e50; margin: 1rem 0; }
        textarea { width: 100%; padding: 10px; margin: 1rem 0; }
        button { padding: 10px 20px; background: #2ea44f; color: white; border: none; border-radius: 6px; cursor: pointer; }
        #result { margin-top: 1rem; padding: 10px; border: 1px solid #e1e4e8; border-radius: 6px; }
    </style>
</head>
<body>
    <h1>AI 文本情感分析系统</h1>

    <!-- 你的个人信息 -->
    <div class="info">
        <h3>姓名：成志坚</h3>
        <h3>学号：423830132</h3>
    </div>

    <textarea id="text" rows="4" placeholder="输入要分析的文本..."></textarea>
    <button onclick="analyzeSentiment()">分析情感</button>

    <div id="result"></div>

    <script>
        async function analyzeSentiment() {
            const text = document.getElementById('text').value;
            if (!text) { alert('请输入文本'); return; }

            const response = await fetch('/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text })
            });
            const data = await response.json();
            document.getElementById('result').innerText =
                `情感：${data.label} | 置信度：${(data.score * 100).toFixed(2)}%`;
        }
    </script>
</body>
</html>
